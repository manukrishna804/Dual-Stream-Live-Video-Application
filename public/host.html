<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Host Dashboard | Obraz Stream</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="glass-bg-glow"></div>
  
  <div class="app-container host-container">
    <header class="app-header">
      <div class="logo">
        <i class="fa-solid fa-tower-broadcast pulse-icon host-pulse"></i>
        <h1>OBRAZ<span>HOST DASHBOARD</span></h1>
      </div>
      <div class="status-panel">
        <div class="host-meta">
          <span class="meta-item"><i class="fa-solid fa-users"></i> Connected Clients: <strong id="active-client-count">0</strong></span>
        </div>
        <span id="connection-status" class="badge badge-disconnected">
          <span class="pulse-dot"></span> Offline
        </span>
      </div>
    </header>

    <main class="host-layout">
      <!-- Welcome/Empty State Overlay -->
      <div id="empty-state" class="empty-state">
        <div class="empty-icon-container">
          <i class="fa-solid fa-ghost"></i>
        </div>
        <h2>Waiting for Incoming Streams...</h2>
        <p>No active broadcasters are currently streaming. Clients must connect, authorize permissions, and click "Go Live" to stream their feeds here.</p>
        <div class="quick-link">
          <a href="/" target="_blank" class="btn btn-primary"><i class="fa-solid fa-external-link"></i> Open Client Broadcaster</a>
        </div>
      </div>

      <!-- Streaming Grid -->
      <section id="clients-grid" class="clients-grid hidden">
        <!-- Client cards will be dynamically appended here by host.js -->
      </section>
    </main>
  </div>

  <script src="js/host.js"></script>
</body>
</html>
